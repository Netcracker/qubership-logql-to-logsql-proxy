version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    all:
      patterns:
      - "*"
# Go mod bot configurations
- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
# Docker bot configurations
- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: chore
    prefix-development: chore
    include: scope
  groups:
    all:
      patterns:
      - "*"
